services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: barterswap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d barterswap"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - barterswap-postgres:/var/lib/postgresql/data

volumes:
  barterswap-postgres:
